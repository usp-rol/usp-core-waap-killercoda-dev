operator:
  image: "${COREWAAP_REGISTRY_SERVER}/${COREWAAP_OPERATOR_IMAGE_PATH}"
  imagePullSecretName: "devuspacr"
  serviceAccount: "usp-core-waap-operator"
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
  config:
    waapSpecDefaults:
      image: "${COREWAAP_REGISTRY_SERVER}/${COREWAAP_PROXY_IMAGE_PATH}"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
