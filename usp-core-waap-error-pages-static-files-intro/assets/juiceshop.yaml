apiVersion: v1
kind: Pod
metadata:
  name: juiceshop
  labels:
    app.kubernetes.io/name: juiceshop
spec:
  containers:
  - name: juiceshop
    image: bkimminich/juice-shop
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
      - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: juiceshop
spec:
  selector:
    app.kubernetes.io/name: juiceshop
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 3000

